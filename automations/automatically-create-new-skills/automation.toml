version = 1
id = "automatically-create-new-skills"
name = "Automatically create new skills"
prompt = '''
Review the last day of ~/.codex/sessions for skill-level operational noise and update existing skills or path-sensitive automations only when the evidence is strong. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence. Start by setting CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions, test -d $CODEX_HOME/automations, test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py, and test -w on every destination parent directory before editing. Run $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py and use its JSON as the primary source for signal counts and high-signal detection only. Treat scanner.skills and high_noise_skills as advisory because session text can contaminate skill attribution; confirm any candidate skill or automation with direct evidence from joined function_call plus function_call_output records, repeated failing commands, and the actual `SKILL.md` path loaded in the triggering session when a skill payload shows one. Exclude the current automation session and any current-run self-noise from both scanner interpretation and manual ranking. Before declaring no changes, inspect yesterday's function_call metadata for repeated non-zero discovery/path failures, including empty-output probes (`test -f`, `rg --files -g`, `git rev-parse`) and suppressed-stderr read-only path probes whose body is only separators or progress markers (for example `sed ... 2>/dev/null; echo '---' ...`), because string-only matching can miss them. Treat repo-specific pytest collection/import failures as repo-specific test/setup failures unless the failing command is a non-test operational tool or the same failure repeats across 2+ non-test sessions. If scanner.high_signals is empty and no repeated non-test discovery failures remain, report no changes. Otherwise build candidates from scanner.high_signals plus manually confirmed failing commands, then intersect with recently touched skills or path-sensitive automations. Do not rank or edit from scanner.high_noise_skills alone when many unrelated skills appear. Cap skill edits to 5 per run, and touch automations only when the failure pattern is automation-specific or the automation is missing the needed guardrail. Prefer tightening an existing skill or automation over creating anything new, and create a new skill only when no existing skill can absorb the pattern. Keep edits minimal and prefer one canonical source of truth: if the session-loaded skill path differs from the $CODEX_HOME counterpart, treat that as source-of-truth drift, report it explicitly, and do not claim a $CODEX_HOME-only edit fixes the observed noise unless a later session shows that same path is active. Remove duplicated signal lists from prompts when a script already owns that data. Quote YAML frontmatter values containing ':'. If `uv` is missing from PATH but `$HOME/.local/bin/uv` exists, prepend `PATH="$HOME/.local/bin:$PATH"` before skill validation; otherwise report validation blocked. Validate every changed skill with uv run --with pyyaml python $CODEX_HOME/skills/.system/skill-creator/scripts/quick_validate.py <skill_dir>; retry once only, then stop and report on second failure. Validate every changed automation.toml with python3 tomllib; if that fails because tomllib is unavailable, try python3.11; if python3.11 is unavailable, fall back to python3 -c 'from pip._vendor import tomli as tomllib'. Before sed, cat, rg, or script execution on a specific path, verify with test -f, test -d, or rg --files -g. If a path is missing, report once and use repo-aware fallback only after recovering a repo root from session workdir or absolute paths. Verify with git -C <repo_root> rev-parse --is-inside-work-tree, then run git -C <repo_root> log --since=1.week --name-only and git -C <repo_root> diff --stat. Do not assume the automation cwd is the repo. Avoid here-doc syntax and avoid rm -f or rm -rf cleanup. Retry an identical failing command at most once before fallback. If a tool rejects --json, rerun without --json and parse text. If a tool rejects the repo flag, rerun without that flag and pass OWNER/REPO positionally when applicable. If jq cannot parse a payload, rerun without --jq or --json and parse plain text. If PR auto-resolution fails, fall back to gh pr list --author @me --state open. If gh hits an interactive TTY allocation issue, rerun once with GH_FORCE_TTY=0 GIT_TERMINAL_PROMPT=0 GH_PAGER=cat. If write_stdin reports closed stdin, rerun via exec_command with tty=true and a fresh session. If grepai is missing, use rg discovery and skip grepai-only steps. If Ollama embedding calls fail, skip embedding steps and continue with rg or grep. If timeout is missing, rerun without timeout or use gtimeout. If pdfinfo is missing, use a Python PDF metadata fallback or skip pdfinfo-only checks with a note. Open an inbox item with high signals, repo-specific test signals, discovery/path failures, files changed, validation evidence, skipped candidates with reasons, and any source-of-truth drift.
'''
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=40"
execution_environment = "local"
model = "gpt-5.4"
reasoning_effort = "xhigh"
