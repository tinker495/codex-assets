name = "Automatically create new skills"
prompt = "Review yesterday's date-partitioned ~/.codex/sessions for skill-level operational noise and improve existing skills or path-sensitive automations only when the evidence is strong. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence.\n\nStart with CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions, test -d $CODEX_HOME/automations, test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py, and test -w on every destination parent directory before editing. Build the explicit yesterday JSONL file list only from the local-date partition $CODEX_HOME/sessions/YYYY/MM/DD/*.jsonl, sort it once, save it, and reuse that exact list for both scan_noise.py and manual review. Treat an empty yesterday list as valid evidence and do not widen scope to a fresh 24h scan or same-day files.\n\nIf the list is non-empty, run $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py with repeated --file arguments. If test -f $CODEX_HOME/automations/daily-automation-review/scripts/manual_review.py, run it next with the same repeated --file arguments and treat its JSON as the canonical source for operational-vs-repo-specific separation, repeated discovery/path probe failures, partial-success probes, read-only replay exclusions, and skill runtime-vs-edit-path drift. Use default 24h mode only as a fallback advisory baseline when file-scoped scanning is unavailable, and never let same-day files override the explicit yesterday scope.\n\nTreat scanner.skills and high_noise_skills as advisory because session text can contaminate skill attribution. Build candidates from scanner.high_signals plus manual-review-confirmed failing commands or missing paths, then intersect with recently touched skills or path-sensitive automations. If manual review shows no repeated operational/path evidence (`top_operational`, `top_missing_paths`, and `discovery_failures` are all empty), report no changes unless direct joined-call evidence still proves an automation-specific failure. Confirm each candidate with joined function_call plus function_call_output evidence and the actual `SKILL.md` path loaded in the triggering session. Report runtime-vs-edit-path drift explicitly, and do not claim a $CODEX_HOME-only edit fixes observed noise unless a later session shows that same path is active.\n\nTreat shell glob-expansion failures such as `zsh:1: no matches found:` from unquoted pytest node ids or bracketed paths as operational noise, not repo test failures; rerun once with correct quoting before escalating. Retry an identical failing command at most once before fallback, and prefer the simpler non-interactive invocation when optional flags or formatters fail. Prefer tightening an existing skill or automation over creating anything new, cap skill edits to 5 per run, and create a new skill only when no existing skill can absorb the pattern.\n\nBefore sed, cat, rg, or script execution on a specific path, verify with test -f, test -d, or rg --files. If a path is missing, report once and recover repo context from session workdir or absolute paths before using git -C <repo_root> rev-parse --is-inside-work-tree, git -C <repo_root> log --since=1.week --name-only, and git -C <repo_root> diff --stat. Avoid here-doc syntax and destructive cleanup commands. Remove duplicated heuristic lists from prompts when a script already owns that data. Validate every changed skill with uv run --with pyyaml python $CODEX_HOME/skills/.system/skill-creator/scripts/quick_validate.py <skill_dir>, prepending PATH=\"$HOME/.local/bin:$PATH\" if needed; retry once only, then stop and report. Validate every changed automation.toml with python3 tomllib, falling back to python3.11 or python3 -c 'from pip._vendor import tomli as tomllib'. Open an inbox item with high signals, confirmed operational failures, repo-specific signals, files changed, validation evidence, skipped candidates with reasons, and any source-of-truth drift."
status = "ACTIVE"
