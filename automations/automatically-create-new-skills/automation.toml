version = 1
id = "automatically-create-new-skills"
kind = "cron"
name = "Automatically create new skills"
prompt = "Review yesterday's date-partitioned ~/.codex/sessions for skill-level operational noise and improve existing skills or path-sensitive automations only when the evidence is strong. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence.\n\nStart with CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions, test -d $CODEX_HOME/automations, test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py, and test -w on every destination parent directory before editing. Build the explicit yesterday JSONL file list only from the local-date partition $CODEX_HOME/sessions/YYYY/MM/DD/*.jsonl, sort it once, save it, and reuse that exact list for both scan_noise.py and manual review. Treat an empty yesterday list as valid evidence and do not widen scope to a fresh 24h scan or same-day files.\n\nIf the list is non-empty, run `python3 $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py` with repeated --file arguments. If test -f $CODEX_HOME/automations/daily-automation-review/scripts/manual_review.py, run `python3 -B $CODEX_HOME/automations/daily-automation-review/scripts/manual_review.py` next with the same repeated --file arguments and treat its JSON as the canonical source. Use `top_operational`, `top_repo_specific`, `top_missing_paths`, `top_missing_modules`, `discovery_failures`, `partial_success_probes`, and `skill_path_drift` as the source of truth. Treat scanner `skills` and `high_noise_skills` as advisory because session text can contaminate attribution.\n\nBuild candidates from `scanner.high_signals` plus manual-review-confirmed repeated failures. Never edit from `scanner.high_noise_skills` alone. Treat repo-specific labels such as `ModuleNotFoundError::<module>` or missing repo paths as repo noise unless the same session also shows an actual `~/.codex/skills/.../SKILL.md` load or a path-sensitive automation command. Report `skill_path_drift` explicitly, and do not claim a $CODEX_HOME edit fixes a non-$CODEX_HOME runtime path unless a later session shows that path is active. Treat shell glob-expansion failures such as `zsh:1: no matches found:` from unquoted pytest node ids or bracketed paths as operational noise, not repo test failures; rerun once with correct quoting before escalating. Retry an identical failing command at most once before fallback, and prefer the simpler non-interactive invocation when optional flags or formatters fail.\n\nPrefer tightening an existing skill or automation over creating anything new, cap skill edits to 5 per run, and create a new skill only when no existing skill can absorb the pattern. Before sed, cat, rg, or script execution on a specific path, verify with test -f, test -d, or rg --files. If a path is missing, report once and recover repo context from session workdir or absolute paths before using git -C <repo_root> rev-parse --is-inside-work-tree, git -C <repo_root> log --since=1.week --name-only, and git -C <repo_root> diff --stat. Avoid here-doc syntax and destructive cleanup commands. Remove duplicated heuristic lists from prompts when a script already owns that data. Validate every changed skill with uv run --with pyyaml python $CODEX_HOME/skills/.system/skill-creator/scripts/quick_validate.py <skill_dir>, prepending PATH=\"$HOME/.local/bin:$PATH\" if needed; retry once only, then stop and report. Validate every changed automation.toml with python3 tomllib, falling back to python3.11 or python3 -c 'from pip._vendor import tomli as tomllib'. Open an inbox item with high signals, confirmed operational failures, repo-specific signals, files changed, validation evidence, skipped candidates with reasons, and any `skill_path_drift`."
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=40"
model = "gpt-5.4"
reasoning_effort = "xhigh"
execution_environment = "local"
cwds = ["~/.codex"]
