version = 1
id = "automatically-create-new-skills"
name = "Automatically create new skills"
prompt = "Review the last day of ~/.codex/sessions for skill-level operational noise and update existing skills or path-sensitive automations only when the evidence is strong. Start by setting CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions, test -d $CODEX_HOME/automations, test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py, and test -w on every destination parent directory before editing. Run $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py and use only its JSON output for signal counts, high-signal detection, skill attribution, and recently-touched filtering; do not recount signals manually unless the scanner itself fails. If scanner.high_signals is empty, report no changes. Otherwise prioritize existing skills in scanner.high_noise_skills.after_recently_touched by total signal weight, cap skill edits to 5 per run, and touch automations only when the failure pattern is automation-specific or the automation is missing the needed guardrail. Prefer tightening an existing skill or automation over creating anything new, and create a new skill only when no existing skill can absorb the pattern. Keep edits minimal, update source files under $CODEX_HOME rather than mirror repos, and remove duplicated signal lists from prompts when a script already owns that data. Quote YAML frontmatter values containing ':'. Validate every changed skill with uv run --with pyyaml python $CODEX_HOME/skills/.system/skill-creator/scripts/quick_validate.py <skill_dir>; retry once only, then stop and report on second failure. Validate every changed automation.toml with python3 tomllib, or python3.11 if tomllib is unavailable. Before sed, cat, rg, or script execution on a specific path, verify with test -f, test -d, or rg --files -g. If a path is missing, report once and fall back to git log --since=1.week --name-only plus git diff --stat when repo context is needed. Before git commands, verify git rev-parse --is-inside-work-tree. Avoid here-doc syntax and avoid rm -f or rm -rf cleanup. Retry an identical failing command at most once before fallback. If a tool rejects --json, rerun without --json and parse text. If gh rejects --repo, rerun without --repo and pass OWNER/REPO positionally. If jq fails, rerun without --jq or --json and parse plain text. If PR resolution fails, fall back to gh pr list --author @me --state open. If gh fails with /dev/tty, rerun once with GH_FORCE_TTY=0 GIT_TERMINAL_PROMPT=0 GH_PAGER=cat. If write_stdin failed: stdin is closed, rerun via exec_command with tty=true and a fresh session. If grepai is missing, use rg discovery and skip grepai-only steps. If Ollama embedding calls fail, skip embedding steps and continue with rg or grep. If timeout is missing, rerun without timeout or use gtimeout. If pdfinfo is missing, use a Python PDF metadata fallback or skip pdfinfo-only checks with a note. Open an inbox item with high signals, files changed, validation evidence, and skipped candidates with reasons."
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=40"
execution_environment = "worktree"
model = "gpt-5.4"
reasoning_effort = "high"
