version = 1
id = "daily-automation-review"
name = "Daily automation review"
prompt = "Review yesterday's ~/.codex/sessions and every existing ~/.codex/automations/*/automation.toml to improve automation quality, not just detect noise. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence. Start by setting CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions and test -d $CODEX_HOME/automations, then inspect each automation.toml and memory.md when present. Build the explicit yesterday JSONL file list first from the local-date partition $CODEX_HOME/sessions/YYYY/MM/DD/*.jsonl, sort it once, and reuse that exact list for both scan_noise.py and manual review. Do not derive yesterday by file mtime or a fresh 24h query. Treat an empty yesterday list as valid evidence, not as a reason to widen scope: if the list is empty, keep session evidence empty for ranking and audit only automation.toml plus memory quality. If test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py and the list is non-empty, run it first against that list using repeated --file arguments. `scan_noise.py` emits JSON on stdout by default, so do not add `--json`; use its default 24h mode only as a fallback advisory baseline when file-scoped scanning is unavailable. If the advisory 24h baseline is used, exclude the current automation session and any current-run self-noise, and never let same-day files override the explicit yesterday scope. If test -f $CODEX_HOME/automations/daily-automation-review/scripts/manual_review.py and the list is non-empty, run it next with the same repeated --file arguments and treat its JSON as the canonical joined-call evidence for actual tool failures, read-only replay exclusions, stderr-style pipeline failures, operational-vs-repo-specific separation, repeated discovery/path probes, partial-success fallbacks, and runtime-vs-edit-path drift. If the helper script is unavailable, apply those same rules manually. If scan_noise.py reports many unrelated skills or far more files than the date-bounded yesterday list, ignore scanner.skills and high_noise_skills and rank only the manual review JSON or equivalent joined-call evidence. If manual_review.py returns no repeated operational/path evidence (`top_operational`, `top_missing_paths`, and `discovery_failures` are all empty), treat scanner.skills and high_noise_skills as advisory only even when a single skill is attributed, and do not let repo-specific-only or drift-only evidence drive ranking. Prefer fixes that improve prompt clarity, execution ordering, source-of-truth ownership, and fallback behavior across existing automations. Rank recommendations by recurrence, blast radius, and confidence. Prefer updating an existing automation over creating a new one, avoid duplicates, and suggest schedule changes only when the current cadence clearly causes stale or noisy behavior. For each automation, produce one of: update now, keep as-is, or retire. When recommending an update, include the exact prompt delta, why the current prompt is weak, and what evidence from sessions or automation memory supports the change. Favor shorter prompts that keep one canonical source of truth; prefer script output over restating heuristic lists in prompt text. Before any repo-script or shared-path reference, verify with test -f, test -d, or rg --files; if missing and repo context is needed, recover a repo root from session workdir or absolute paths, verify with git -C <repo_root> rev-parse --is-inside-work-tree, then use git -C <repo_root> log --since=1.week --name-only and git -C <repo_root> diff --stat. Do not assume the automation cwd is the repo. Avoid here-doc syntax and prefer python -c or single-line commands. If you change any automation.toml, validate it with python3 tomllib; if that fails because tomllib is unavailable, try python3.11; if python3.11 is unavailable, fall back to python3 -c 'from pip._vendor import tomli as tomllib'. If a tool rejects --json, rerun without --json and parse text. Open an inbox item with a ranked table of current automations, recommended action, exact field deltas, rationale, no-change evidence where applicable, and any runtime-vs-edit-path drift."
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=50"
execution_environment = "local"
model = "gpt-5.4"
reasoning_effort = "xhigh"
