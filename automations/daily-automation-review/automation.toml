version = 1
id = "daily-automation-review"
name = "Daily automation review"
prompt = "Review yesterday's ~/.codex/sessions and every existing ~/.codex/automations/*/automation.toml to improve automation quality, not just detect noise. Start by setting CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions and test -d $CODEX_HOME/automations, then inspect each automation.toml and memory.md when present. Count noise only from JSONL records where type=response_item and payload.type=function_call_output; ignore quoted error strings inside assistant prose or other blobs. Separate operational noise from repo-specific test failures, and prefer fixes that improve prompt clarity, execution ordering, source-of-truth ownership, and fallback behavior across existing automations. Rank recommendations by recurrence, blast radius, and confidence. Prefer updating an existing automation over creating a new one, avoid duplicates, and suggest schedule changes only when the current cadence clearly causes stale or noisy behavior. For each automation, produce one of: update now, keep as-is, or retire. When recommending an update, include the exact prompt delta, why the current prompt is weak, and what evidence from sessions or automation memory supports the change. Favor shorter prompts that keep one canonical source of truth, for example using a script output instead of restating signal lists in the prompt. Before any repo-script or shared-path reference, verify with test -f, test -d, or rg --files; if missing, fall back to git log --since=1.week --name-only and git diff --stat. Avoid here-doc syntax and prefer python -c or single-line commands. If a tool rejects --json, rerun without --json and parse text. Open an inbox item with a ranked table of current automations, recommended action, exact field deltas, rationale, and no-change evidence where applicable."
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=50"
execution_environment = "worktree"
model = "gpt-5.4"
reasoning_effort = "high"
cwds = ["/Users/mrx-ksjung/project/codex-skills"]
