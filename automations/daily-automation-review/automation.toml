version = 1
id = "daily-automation-review"
name = "Daily automation review"
prompt = "Review yesterday's ~/.codex/sessions and every existing ~/.codex/automations/*/automation.toml to improve automation quality, not just detect noise. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence. Start by setting CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions and test -d $CODEX_HOME/automations, then inspect each automation.toml and memory.md when present. Build the explicit yesterday JSONL file list first from the local-date partition $CODEX_HOME/sessions/YYYY/MM/DD/*.jsonl, sort it once, and reuse that exact list for both scan_noise.py and manual review. Do not derive yesterday by file mtime or a fresh 24h query. Treat an empty yesterday list as valid evidence, not as a reason to widen scope: if the list is empty, keep session evidence empty for ranking and audit only automation.toml plus memory quality. If test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py and the list is non-empty, run it first against that list using repeated --file arguments. `scan_noise.py` emits JSON on stdout by default, so do not add `--json`; use its default 24h mode only as a fallback advisory baseline when file-scoped scanning is unavailable. If the advisory 24h baseline is used, exclude the current automation session and any current-run self-noise, and never let same-day files override the explicit yesterday scope. Otherwise fall back to manual review. For manual review, join each JSONL function_call_output to its function_call name/arguments, count only actual tool failure text, ignore successful read-only observers such as cat, sed, find, rg search, or tmux capture-pane, ignore literal signal strings when they appear only inside echoed source code, regex tables, or printed script definitions from a successful command, treat stderr-style shell failure lines inside pipeline output as failures even when the overall command exits 0, and separate operational noise from repo-specific test/setup failures. If a session skill payload shows a `SKILL.md` path outside $CODEX_HOME, compare that runtime path against the path an automation would edit and treat any mismatch as a source-of-truth ownership issue. If scan_noise.py reports many unrelated skills or far more files than the date-bounded yesterday list, ignore scanner.skills and high_noise_skills and rank only the joined-call manual evidence. Also inspect repeated non-zero discovery/path commands, including empty-output probes (`test -f`, `rg --files -g`, `git rev-parse`) and suppressed-stderr read-only path probes whose body is only separators or progress markers (for example `sed ... 2>/dev/null; echo '---' ...`), because string-only scans miss them. If a multi-candidate discovery/path probe exits non-zero but stdout already shows at least one resolved candidate path or file listing, treat it as partial-success fallback evidence rather than a failure unless the missing candidate is itself the canonical source-of-truth path. Prefer fixes that improve prompt clarity, execution ordering, source-of-truth ownership, and fallback behavior across existing automations. Rank recommendations by recurrence, blast radius, and confidence. Prefer updating an existing automation over creating a new one, avoid duplicates, and suggest schedule changes only when the current cadence clearly causes stale or noisy behavior. For each automation, produce one of: update now, keep as-is, or retire. When recommending an update, include the exact prompt delta, why the current prompt is weak, and what evidence from sessions or automation memory supports the change. Favor shorter prompts that keep one canonical source of truth, for example using a script output instead of restating signal lists in the prompt. Before any repo-script or shared-path reference, verify with test -f, test -d, or rg --files; if missing and repo context is needed, recover a repo root from session workdir or absolute paths, verify with git -C <repo_root> rev-parse --is-inside-work-tree, then use git -C <repo_root> log --since=1.week --name-only and git -C <repo_root> diff --stat. Do not assume the automation cwd is the repo. Avoid here-doc syntax and prefer python -c or single-line commands. If you change any automation.toml, validate it with python3 tomllib; if that fails because tomllib is unavailable, try python3.11; if python3.11 is unavailable, fall back to python3 -c 'from pip._vendor import tomli as tomllib'. If a tool rejects --json, rerun without --json and parse text. Open an inbox item with a ranked table of current automations, recommended action, exact field deltas, rationale, no-change evidence where applicable, and any runtime-vs-edit-path drift."
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=50"
execution_environment = "local"
model = "gpt-5.4"
reasoning_effort = "xhigh"
