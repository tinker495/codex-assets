version = 1
id = "daily-automation-review"
name = "Daily automation review"
prompt = "Review yesterday's ~/.codex/sessions and every existing ~/.codex/automations/*/automation.toml to improve automation quality, not just detect noise. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence. Start by setting CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions and test -d $CODEX_HOME/automations, then inspect each automation.toml and memory.md when present. Build the explicit yesterday JSONL file list first. If test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py, run it first against that list using repeated --file arguments; use its default 24h mode only as a fallback advisory baseline when file-scoped scanning is unavailable. Otherwise fall back to manual review. For manual review, join each JSONL function_call_output to its function_call name/arguments, count only actual tool failure text, ignore successful read-only observers such as cat, sed, find, rg search, or tmux capture-pane, treat stderr-style shell failure lines inside pipeline output as failures even when the overall command exits 0, and separate operational noise from repo-specific test/setup failures. If a session skill payload shows a `SKILL.md` path outside $CODEX_HOME, compare that runtime path against the path an automation would edit and treat any mismatch as a source-of-truth ownership issue. If scan_noise.py reports many unrelated skills or far more files than the date-bounded yesterday list, ignore scanner.skills and high_noise_skills and rank only the joined-call manual evidence. Also inspect repeated non-zero discovery/path commands with empty output, such as test -f, rg --files -g, or git rev-parse, because string-only scans miss them. Prefer fixes that improve prompt clarity, execution ordering, source-of-truth ownership, and fallback behavior across existing automations. Rank recommendations by recurrence, blast radius, and confidence. Prefer updating an existing automation over creating a new one, avoid duplicates, and suggest schedule changes only when the current cadence clearly causes stale or noisy behavior. For each automation, produce one of: update now, keep as-is, or retire. When recommending an update, include the exact prompt delta, why the current prompt is weak, and what evidence from sessions or automation memory supports the change. Favor shorter prompts that keep one canonical source of truth, for example using a script output instead of restating signal lists in the prompt. Before any repo-script or shared-path reference, verify with test -f, test -d, or rg --files; if missing and repo context is needed, recover a repo root from session workdir or absolute paths, verify with git -C <repo_root> rev-parse --is-inside-work-tree, then use git -C <repo_root> log --since=1.week --name-only and git -C <repo_root> diff --stat. Do not assume the automation cwd is the repo. Avoid here-doc syntax and prefer python -c or single-line commands. If a tool rejects --json, rerun without --json and parse text. Open an inbox item with a ranked table of current automations, recommended action, exact field deltas, rationale, no-change evidence where applicable, and any runtime-vs-edit-path drift."
status = "PAUSED"
