version = 1
id = "daily-automation-review"
name = "Daily automation review"
prompt = '''
Review yesterday's date-partitioned ~/.codex/sessions together with every existing ~/.codex/automations/*/automation.toml to improve automation quality, not just detect noise. Write all user-facing progress updates, ranked tables, recommendations, inbox titles, inbox summaries, and final briefings in Korean. Keep commands, paths, ids, code, and literal error text unchanged when quoting evidence.

Start with CODEX_HOME=${CODEX_HOME:-$HOME/.codex}; verify test -d $CODEX_HOME/sessions and test -d $CODEX_HOME/automations, then inspect every automation.toml and memory.md when present. Build the explicit yesterday JSONL file list only from the local-date partition $CODEX_HOME/sessions/YYYY/MM/DD/*.jsonl, sort it once, save it, and reuse that exact list for every script and manual check. Do not widen to file mtime or a fresh 24h scan when the list is empty.

If test -f $CODEX_HOME/automations/automatically-create-new-skills/scripts/scan_noise.py and the list is non-empty, run it first with repeated --file arguments and treat its skill attribution as advisory only. If test -f $CODEX_HOME/automations/daily-automation-review/scripts/manual_review.py and the list is non-empty, run it next with the same repeated --file arguments and treat its JSON as the canonical source for operational-vs-repo-specific separation, repeated path failures, partial-success probes, replay exclusions, and runtime-vs-edit-path drift. If manual review shows no repeated operational/path evidence (`top_operational`, `top_missing_paths`, and `discovery_failures` are all empty), do not rank or edit from scanner.high_noise_skills alone.

Rank recommendations by recurrence, blast radius, and confidence. For each automation, output exactly one of update now, keep as-is, or retire. Prefer updating an existing automation over creating a new one, avoid duplicates, and suggest schedule changes only when cadence clearly causes stale or noisy behavior. Favor shorter prompts with one canonical source of truth; when recommending an update, include the exact prompt delta, why the current prompt is weak, and the supporting session or memory evidence.

Before any repo-specific script or shared-path reference, verify with test -f, test -d, or rg --files. If repo context is still needed, recover a repo root from session workdir or absolute paths, verify with git -C <repo_root> rev-parse --is-inside-work-tree, then use git -C <repo_root> log --since=1.week --name-only and git -C <repo_root> diff --stat. Do not assume the automation cwd is the repo. Avoid here-doc syntax and prefer python -c or single-line commands. If you change any automation.toml, validate it with python3 tomllib; if unavailable, fall back to python3.11 or python3 -c 'from pip._vendor import tomli as tomllib'. Open an inbox item with a ranked table of current automations, recommended action, exact field deltas, rationale, no-change evidence where applicable, and any runtime-vs-edit-path drift.
'''
status = "ACTIVE"
rrule = "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;BYHOUR=10;BYMINUTE=50"
execution_environment = "local"
model = "gpt-5.4"
reasoning_effort = "xhigh"
